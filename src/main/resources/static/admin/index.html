<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmneziaBot Admin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
            color: #222;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .panel {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        input, button, select {
            padding: 8px 10px;
            border: 1px solid #bbb;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            cursor: pointer;
            background: #fff;
        }
        button.active {
            background: #222;
            color: #fff;
            border-color: #222;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }
        .stat {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
        }
        .stat .value {
            font-size: 20px;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            background: #fff;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            vertical-align: top;
            text-align: left;
        }
        th {
            background: #fafafa;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .table-wrap {
            overflow: auto;
            max-height: 68vh;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .muted {
            color: #666;
            font-size: 12px;
        }
        .error {
            color: #b00020;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>AmneziaBot Admin UI</h2>

    <div class="panel row">
        <label for="token"><b>X-Admin-Token</b></label>
        <input id="token" type="password" placeholder="Введите admin token" style="min-width: 340px;" />
        <button id="saveToken">Сохранить токен</button>
        <button id="refreshAll">Обновить данные</button>
        <span id="status" class="muted">Готово</span>
    </div>

    <div class="stats" id="stats"></div>

    <div class="panel row">
        <button id="tabUsers" class="active">Клиенты</button>
        <button id="tabSubs">Подписки</button>
        <input id="search" type="text" placeholder="Поиск: username, telegramId, uuid, email, plan" style="min-width: 320px;" />
    </div>

    <div id="error" class="error"></div>

    <div id="usersSection" class="table-wrap"></div>
    <div id="subsSection" class="table-wrap" style="display:none"></div>
</div>
<script type="module" src="/admin/app.js"></script>
</body>
</html>
