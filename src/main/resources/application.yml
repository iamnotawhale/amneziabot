spring:
  application:
    name: amneziabot
  datasource:
    url: ${DB_URL:jdbc:h2:mem:amneziabot;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}

xray:
  container-name: ${XRAY_CONTAINER:amnezia-xray}
  config-path: ${XRAY_CONFIG_PATH:/opt/amnezia/xray/server.json}
  host: ${XRAY_HOST}
  port: ${XRAY_PORT:448}
  public-key: ${XRAY_PUBLIC_KEY}
  sni: ${XRAY_SNI}
  short-id: ${XRAY_SHORT_ID}
  flow: ${XRAY_FLOW:xtls-rprx-vision}
  fingerprint: ${XRAY_FINGERPRINT:chrome}

app:
  expire-job-ms: ${APP_EXPIRE_JOB_MS:300000}
  idempotency-ttl-days: ${APP_IDEMPOTENCY_TTL_DAYS:7}
  idempotency-cleanup-ms: ${APP_IDEMPOTENCY_CLEANUP_MS:3600000}

telegram:
  enabled: ${TELEGRAM_ENABLED:false}
  bot-token: ${TELEGRAM_BOT_TOKEN}
  bot-username: ${TELEGRAM_BOT_USERNAME}

admin:
  enabled: ${ADMIN_ENABLED:true}
  token: ${ADMIN_TOKEN}
