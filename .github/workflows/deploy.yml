name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 90m
          script_stop: true
          script: |
            set -euo pipefail
            echo "[deploy] start $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

            if command -v sudo >/dev/null 2>&1; then
              if ! sudo -n true 2>/dev/null; then
                echo "Passwordless sudo is required for DEPLOY_USER=${USER}."
                echo "Grant NOPASSWD for git/systemctl/apt or run deploy as root."
                exit 1
              fi
            fi

            REPO_DIR="/opt/amneziabot"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "Repo not found at $REPO_DIR, cloning..."
              sudo -n mkdir -p /opt
              sudo -n rm -rf "$REPO_DIR"
              sudo -n git clone "$REPO_URL" "$REPO_DIR"
              sudo -n chown -R "${USER}:${USER}" "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git fetch origin
            git reset --hard origin/main

            if [ ! -f "$REPO_DIR/scripts/prod/cicd.sh" ]; then
              echo "scripts/prod/cicd.sh not found after update"
              exit 1
            fi

            bash "$REPO_DIR/scripts/prod/cicd.sh" deploy "$REPO_DIR" main
            echo "[deploy] done $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
