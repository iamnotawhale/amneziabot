name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build admin UI and backend jar
        run: |
          set -euo pipefail
          npm install
          npm run admin:build
          mvn -B --no-transfer-progress -DskipTests clean package
          cp "$(ls -1 target/amneziabot-*.jar | grep -v '\.original$' | head -n1)" amneziabot.jar

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: amneziabot-jar
          path: amneziabot.jar
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: amneziabot-jar
          path: .

      - name: Upload jar to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: amneziabot.jar
          target: /tmp
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 90m
          script_stop: true
          request_pty: true
          debug: true
          script: |
            set -euo pipefail
            echo "[deploy] start $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "[deploy] user=$(id -un) host=$(hostname) pwd=$(pwd)"
            echo "[deploy] checking sudo..."

            if command -v sudo >/dev/null 2>&1; then
              if ! sudo -n true 2>/dev/null; then
                echo "Passwordless sudo is required for DEPLOY_USER=${USER}."
                echo "Grant NOPASSWD for git/systemctl/apt or run deploy as root."
                exit 1
              fi
            fi
            echo "[deploy] sudo check passed"

            REPO_DIR="/opt/amneziabot"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            echo "[deploy] repo dir: ${REPO_DIR}"

            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "Repo not found at $REPO_DIR, cloning..."
              sudo -n mkdir -p /opt
              sudo -n rm -rf "$REPO_DIR"
              sudo -n git clone "$REPO_URL" "$REPO_DIR"
              sudo -n chown -R "${USER}:${USER}" "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            echo "[deploy] fetching origin/main..."
            timeout 180 git fetch origin
            echo "[deploy] fetch done"
            echo "[deploy] resetting to origin/main..."
            git reset --hard origin/main
            echo "[deploy] reset done"

            if [ ! -f "$REPO_DIR/scripts/prod/cicd.sh" ]; then
              echo "scripts/prod/cicd.sh not found after update"
              exit 1
            fi

            echo "[deploy] starting cicd deploy with prebuilt artifact..."
            ARTIFACT_PATH=/tmp/amneziabot.jar bash "$REPO_DIR/scripts/prod/cicd.sh" deploy "$REPO_DIR" main
            echo "[deploy] done $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
