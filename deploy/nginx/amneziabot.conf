server {
    listen 80;
    server_name YOUR_DOMAIN;

    access_log /var/log/nginx/amneziabot.access.log;
    error_log  /var/log/nginx/amneziabot.error.log;

    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /admin/ {
        auth_basic "AmneziaBot Admin";
        auth_basic_user_file /etc/nginx/.amneziabot_htpasswd;

        proxy_pass http://127.0.0.1:8080/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/admin/ {
        auth_basic "AmneziaBot Admin API";
        auth_basic_user_file /etc/nginx/.amneziabot_htpasswd;

        proxy_pass http://127.0.0.1:8080/api/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
